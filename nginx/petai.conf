# HTTP -> HTTPS 重定向
server {
    listen 80;
    server_name aipet.gzyhm.xyz www.aipet.gzyhm.xyz;
    return 301 https://$host$request_uri;
}

# HTTPS 配置
server {
    listen 443 ssl;
    server_name aipet.gzyhm.xyz www.aipet.gzyhm.xyz;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/aipet.gzyhm.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aipet.gzyhm.xyz/privkey.pem;

    # 前端
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE 流式传输（关键！关闭缓冲）
    location ~ ^/api/consultation/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 上传文件大小限制
    client_max_body_size 10M;
}
